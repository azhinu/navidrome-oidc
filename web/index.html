<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navidrome Account Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,100..1000&display=swap" />
  <link rel="stylesheet" href="static/styles.css" />
  <script defer src="static/app.js"></script>
</head>
<body>
  <div class="layout">
    <div class="hero" aria-hidden="true"></div>
    <main class="card" data-state="loading">
      <section class="user" aria-live="polite">
        <div class="avatar" data-avatar></div>
        <div class="identity">
          <p class="hi" data-name>Hi, User</p>
          <p class="email" data-email>user@example.com</p>
        </div>
      </section>
      <p class="status" data-status aria-live="polite" hidden></p>
      <form class="form" autocomplete="off">
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" minlength="6" maxlength="256" autocomplete="new-password" required />
        </label>
        <button type="submit" class="action" data-action>Loading…</button>
        <p class="hint">Use your e-mail and this password to log in Navidrome</p>
      </form>
    </main>
  </div>
</body>
</html>
