<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ND Credential Portal</title>
  <link rel="stylesheet" href="static/styles.css" />
  <script defer src="static/app.js"></script>
</head>
<body>
  <main class="card" data-state="loading">
    <section class="user" aria-live="polite">
      <div class="avatar" data-avatar></div>
      <div class="identity">
        <p class="hi" data-name>Hi, User</p>
        <p class="email" data-email>user@example.com</p>
      </div>
    </section>
    <section class="error" data-error hidden></section>
    <section class="status" data-status aria-live="polite" hidden></section>
    <form class="form" autocomplete="off">
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" minlength="6" maxlength="256" autocomplete="new-password" required />
      </label>
      <button type="submit" class="action" data-action>Loading…</button>
      <p class="hint">Use this credentials to log in on the next page.</p>
    </form>
  </main>
</body>
</html>
